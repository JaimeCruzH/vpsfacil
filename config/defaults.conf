################################################################################
# VPSfacil - Default Configuration
# These values can be overridden by environment variables or .env files
################################################################################

# Base Configuration
BASE_DOMAIN="agentexperto.work"
ADMIN_USER="jaime"
APPS_BASE_DIR="/home/jaime/apps"

# System Configuration
DEBIAN_VERSION="12"
TIMEZONE="UTC"
ENABLE_FIREWALL="true"
SSH_PORT="22"
DEFAULT_SSH_TIMEOUT="30"

# Docker Configuration
DOCKER_NETWORK_NAME="vpsfacil-network"
DOCKER_SUBNET="172.18.0.0/16"
REGISTRY_URL="docker.io"

# Port Mappings (Internal - Nginx proxies external access)
PORT_PORTAINER="9000"
PORT_PORTAINER_EDGE="8000"
PORT_NGINX_MANAGER="81"
PORT_NGINX_WEB="80"
PORT_NGINX_SSL="443"
PORT_TAILSCALE="41641"

# Application Port Defaults
PORT_N8N="5678"
PORT_FILEBROWSER="80"

# Health Check Configuration
HEALTH_CHECK_TIMEOUT="60"
HEALTH_CHECK_RETRIES="3"
PORT_CHECK_INTERVAL="1"

# Backup Configuration
BACKUP_RETENTION_DAYS="30"
BACKUP_COMPRESSION="gzip"
BACKUP_SCHEDULE="0 2 * * *"  # Daily at 2 AM UTC

# API Tokens & Secrets (Override in .env)
CLOUDFLARE_API_TOKEN="${CLOUDFLARE_API_TOKEN:-}"
CLOUDFLARE_ZONE_ID="${CLOUDFLARE_ZONE_ID:-}"
PORTAINER_API_KEY="${PORTAINER_API_KEY:-}"

# Logging
LOG_LEVEL="INFO"  # INFO, WARNING, ERROR, DEBUG
LOG_DIR="/var/log/vpsfacil"
LOG_FILE="${LOG_DIR}/installation.log"

# User Prompts
PROMPT_TIMEOUT="300"  # 5 minutes for user input
CONFIRM_TIMEOUT="10"

# Features
ENABLE_TAILSCALE="true"
ENABLE_KOPIA_BACKUP="true"
ENABLE_AUTOMATIC_UPDATES="false"

# Docker Image Versions (can be overridden)
PORTAINER_IMAGE_VERSION="latest"
NGINX_MANAGER_IMAGE_VERSION="latest"
TAILSCALE_IMAGE_VERSION="latest"
KOPIA_IMAGE_VERSION="latest"
N8N_IMAGE_VERSION="latest"
FILEBROWSER_IMAGE_VERSION="latest"

################################################################################
# End of Default Configuration
################################################################################
